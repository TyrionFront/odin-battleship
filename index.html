<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship</title>
<script defer src="bundle.js"></script></head>
<body>
  <header>
    <h1>⚓ Battleship</h1>
  </header>

  <main>
    <section id="placement-screen">
      <h2>Place Your Ships</h2>
      <p id="placement-info"></p>
      <div class="placement-controls">
        <button id="rotate-btn">Rotate Ship (R)</button>
        <button id="random-placement-btn">Random Placement</button>
      </div>
      <div id="placement-board" class="board placement-board"></div>
    </section>

    <section id="game-screen" class="hidden">
      <div id="message" class="message info"></div>
      <div class="boards-container">
        <div class="board-wrapper">
          <h2>Your Fleet</h2>
          <div id="human-board" class="board"></div>
        </div>
        <div class="board-wrapper">
          <h2>Enemy Waters</h2>
          <div id="computer-board" class="board enemy-board"></div>
        </div>
      </div>
      <button id="new-game-btn" class="hidden">New Game</button>
    </section>
  </main>
</body>
</html>
